name: Flatpak build
# Task 6 of docs/superpowers/plans/2026-07-15-flatpak-packaging.md
# The push-paths trigger exists for the development iteration loop and will be
# removed once the build is stable (leaving workflow_dispatch + release tags).

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Attach the bundle to this existing release tag (leave empty to just build)'
        required: false
        default: ''
  push:
    branches: ['main']
    paths:
      - 'packaging/flatpak/**'
      - '.github/workflows/flatpak.yml'
  release:
    types: [published]

# The release job uploads GLaSSIST.flatpak as a release asset
permissions:
  contents: write

jobs:
  flatpak:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      # Safety net: flatpak info reads the version from metainfo.xml, which is
      # easy to forget when tagging. Injects the release tag if it is missing.
      # (Flathub builds from the tagged source, so the <release> entry should
      # still be committed before tagging - this only fixes the GH bundle.)
      - name: Stamp release version into metainfo
        if: github.event_name == 'release'
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          FILE=packaging/flatpak/io.github.SmolinskiP.GLaSSIST.metainfo.xml
          if ! grep -q "version=\"${VERSION}\"" "$FILE"; then
            sed -i "s|<releases>|<releases>\n    <release version=\"${VERSION}\" date=\"$(date -u +%Y-%m-%d)\"/>|" "$FILE"
            echo "Stamped ${VERSION} into metainfo"
          fi
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: GLaSSIST.flatpak
          manifest-path: packaging/flatpak/io.github.SmolinskiP.GLaSSIST.yml
          cache-key: flatpak-builder-${{ hashFiles('packaging/flatpak/**') }}
      - name: Attach bundle to release
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          files: GLaSSIST.flatpak
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
