name: Flatpak pip modules generation
# Task 5 of docs/superpowers/plans/2026-07-15-flatpak-packaging.md
# Generates packaging/flatpak/python3-modules.json and commits it back to the repo.

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/flatpak-pipgen.yml'
      - 'packaging/flatpak/requirements-linux.txt'

permissions:
  contents: write

jobs:
  pipgen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pip-compile evaluates environment markers against the running Python;
      # it must match the GNOME 49 runtime (3.13) or the standard-* backports
      # (aifc/sunau removed from the 3.13 stdlib) get dropped from the lock.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install req2flatpak and pip-tools
        run: pip install req2flatpak pip-tools
      - name: Resolve full dependency tree
        run: pip-compile --strip-extras --no-header --output-file packaging/flatpak/requirements-linux-locked.txt packaging/flatpak/requirements-linux.txt
      - name: Generate module JSON
        # req2flatpak queries the PyPI API per package; shared runner IPs get
        # rate-limited now and then, so retry before giving up.
        run: |
          for i in 1 2 3; do
            if req2flatpak --requirements-file packaging/flatpak/requirements-linux-locked.txt --target-platforms 313-x86_64 --outfile packaging/flatpak/python3-modules.json; then
              exit 0
            fi
            echo "attempt $i failed, retrying in 30s"
            sleep 30
          done
          exit 1
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packaging/flatpak/requirements-linux-locked.txt packaging/flatpak/python3-modules.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: regenerate flatpak python modules"
          # Retry with rebase - a concurrent push to main must not fail the run
          git push || (git pull --rebase origin main && git push)
