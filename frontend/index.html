<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLaSSIST</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #101418;
      font-family: "Segoe UI", Tahoma, sans-serif;
      -webkit-app-region: drag;
    }
    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 45%, #17222a 0%, #101418 55%, #0a0d10 100%);
    }

    #ring {
      width: 190px;
      height: 190px;
      border-radius: 50%;
      border: 12px solid #4fc3f7;
      background: transparent;
      box-shadow: 0 0 18px rgba(79, 195, 247, 0.80), inset 0 0 18px rgba(79, 195, 247, 0.45);
      opacity: 0.72;
      transform: scale(0.93);
      transition: border-color 120ms linear, box-shadow 120ms linear, opacity 120ms linear, transform 80ms linear;
      pointer-events: none;
      z-index: 20;
      display: block;
    }

    #ring.pulsing {
      animation: pulse 1.1s infinite ease-in-out;
    }

    @keyframes pulse {
      0% { transform: scale(0.90); }
      50% { transform: scale(1.03); }
      100% { transform: scale(0.90); }
    }

    #state {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #cfd8dc;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      padding: 4px 10px;
      pointer-events: none;
      z-index: 30;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    #errorText, #successText, #responseText {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      max-width: 80%;
      text-align: center;
      line-height: 1.4;
      padding: 10px 14px;
      border-radius: 10px;
      display: none;
      pointer-events: none;
      z-index: 40;
      background: rgba(0, 0, 0, 0.70);
      border: 1px solid transparent;
    }

    #errorText {
      top: 50%;
      transform: translate(-50%, -50%);
      color: #ff6b6b;
      border-color: #ff6b6b;
      font-weight: 700;
    }

    #successText {
      top: 50%;
      transform: translate(-50%, -50%);
      color: #7ee787;
      border-color: #7ee787;
      font-weight: 700;
    }

    #responseText {
      bottom: 18%;
      color: #90caf9;
      border-color: #90caf9;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="state">hidden</div>
    <div id="ring"></div>
    <div id="errorText"></div>
    <div id="successText"></div>
    <div id="responseText"></div>
  </div>

  <script>
    let websocket = null;
    let currentState = "hidden";
    let audioData = [];
    let isAnimating = false;

    const ring = document.getElementById("ring");
    const stateLabel = document.getElementById("state");
    const errorText = document.getElementById("errorText");
    const successText = document.getElementById("successText");
    const responseText = document.getElementById("responseText");

    const stateColors = {
      hidden: "#2f6f86",
      listening: "#4fc3f7",
      processing: "#ff9800",
      responding: "#9c27b0",
      error: "#f44336",
      success: "#4caf50",
      connecting: "#ffeb3b"
    };

    const pulseStates = new Set(["processing", "error", "connecting", "success"]);

    function show(el, msg) {
      if (!el) return;
      if (typeof msg === "string") el.textContent = msg;
      el.style.display = "block";
    }

    function hide(el) {
      if (!el) return;
      el.style.display = "none";
    }

    function getAudioLevel(fft) {
      if (!Array.isArray(fft) || fft.length === 0) return 0;
      const n = Math.min(24, fft.length);
      let s = 0;
      for (let i = 0; i < n; i++) s += Math.max(0, Number(fft[i]) || 0);
      return Math.min(1, s / n);
    }

    function applyStateVisual(state, level) {
      const color = stateColors[state] || stateColors.hidden;
      const isHidden = state === "hidden";

      ring.style.borderColor = color;
      ring.style.boxShadow = `0 0 18px ${color}cc, inset 0 0 18px ${color}66`;
      ring.style.opacity = isHidden ? "0.72" : "0.96";

      if (pulseStates.has(state)) {
        ring.classList.add("pulsing");
      } else {
        ring.classList.remove("pulsing");
        const minScale = isHidden ? 0.90 : 0.92;
        const maxScale = isHidden ? 0.95 : 1.10;
        const scale = minScale + (maxScale - minScale) * Math.min(1, Math.max(0, level));
        ring.style.transform = `scale(${scale})`;
      }

      stateLabel.textContent = state;
    }

    function changeState(newState, data = {}) {
      if (!newState) return;
      currentState = newState;

      hide(errorText);
      hide(successText);
      if (newState === "hidden") hide(responseText);

      if (newState === "error" && data.errorMessage) show(errorText, data.errorMessage);
      if ((newState === "success" || newState === "connecting") && data.successMessage) {
        show(successText, data.successMessage);
      }

      applyStateVisual(newState, 0);

      if (!isAnimating) {
        isAnimating = true;
        requestAnimationFrame(animate);
      }
    }

    function animate() {
      if (!isAnimating) return;
      const level = getAudioLevel(audioData);
      applyStateVisual(currentState, level);
      requestAnimationFrame(animate);
    }

    function handleMessage(data) {
      switch (data.type) {
        case "state_change":
          changeState(data.state, data);
          break;
        case "audio_data":
          audioData = data.fft || [];
          break;
        case "response_text":
          if (data.text) show(responseText, data.text);
          break;
        default:
          break;
      }
    }

    function initWebSocket() {
      try {
        websocket = new WebSocket("ws://localhost:8765");

        websocket.onopen = () => {
          websocket.send(JSON.stringify({ type: "ready" }));
        };

        websocket.onmessage = (event) => {
          const data = JSON.parse(event.data);
          handleMessage(data);
        };

        websocket.onclose = () => {
          setTimeout(initWebSocket, 2000);
        };
      } catch (e) {
        setTimeout(initWebSocket, 2000);
      }
    }

    document.addEventListener("click", () => {
      if (currentState === "hidden" && websocket && websocket.readyState === WebSocket.OPEN) {
        websocket.send(JSON.stringify({ type: "activate_voice_command" }));
      }
    });

    setInterval(() => {
      if (websocket && websocket.readyState === WebSocket.OPEN) {
        websocket.send(JSON.stringify({ type: "ping" }));
      }
    }, 30000);

    changeState("hidden", {});
    initWebSocket();
  </script>
</body>
</html>
